# =============================
#       NickPlugin 설정
# =============================

# 닉네임 길이 제한
nick-min-length: 2
nick-max-length: 16

# 채팅 포맷 (닉네임 적용)
# 사용 가능한 변수:
#   %nick%      - 닉네임 (설정 안 하면 원래 이름)
#   %realname%  - 실제 이름
#   %prefix%    - 권한 플러그인 prefix (없으면 공백)
#   %suffix%    - 권한 플러그인 suffix (없으면 공백)
#   %message%   - 채팅 내용
chat-format: "&7[&f%nick%&7] &f%message%"

# 탭리스트 포맷
# 사용 가능한 변수: %nick%, %realname%
tab-format: "%nick%"

# 이름표(네임태그) 포맷
# 사용 가능한 변수: %nick%, %realname%
nametag-format: "%nick%"

# 닉네임 색상 허용 여부 (nickplugin.nick.color 권한 필요)
allow-colors: true

# 닉네임 특수문자 허용 여부 (영문, 숫자, _ 외)
allow-special-chars: false

# 허용되지 않는 닉네임 필터 (소문자로 작성)
blocked-nicks:
  - "admin"
  - "operator"
  - "console"
  - "server"

# 닉네임 저장 방식: "yaml" (파일 저장)
storage-type: yaml

# 닉네임 표시 형식 (이름 앞에 붙는 태그)
# op-tag: "&c[OP] "  # OP에게 붙는 태그 (비워두면 미사용)
op-tag: ""

# 기본 닉네임 색상 (일반 플레이어)
default-nick-color: "&f"

# OP 닉네임 색상
op-nick-color: "&c"

# 메시지 설정
messages:
  nick-changed: "&a닉네임이 &e%nick% &a로 변경되었습니다!"
  nick-reset: "&a닉네임이 초기화되었습니다."
  nick-changed-other: "&a%player% 의 닉네임을 &e%nick% &a로 변경했습니다."
  nick-reset-other: "&a%player% 의 닉네임을 초기화했습니다."
  no-permission: "&c권한이 없습니다."
  player-not-found: "&c플레이어를 찾을 수 없습니다."
  nick-too-short: "&c닉네임이 너무 짧습니다. (최소 %min%자)"
  nick-too-long: "&c닉네임이 너무 깁니다. (최대 %max%자)"
  nick-invalid-chars: "&c닉네임에 사용할 수 없는 문자가 포함되어 있습니다."
  nick-blocked: "&c해당 닉네임은 사용할 수 없습니다."
  nick-already-used: "&c이미 사용 중인 닉네임입니다."
  usage-nick: "&c사용법: /nick <닉네임>"
  usage-nickreset: "&c사용법: /nickreset [플레이어]"
